name: Deploy

on:
  push:
    branches: [main, develop]

jobs:
  deploy-develop:
    name: Deploy to Develop (port 8000)
    runs-on: ubuntu-latest
    permissions: {}
    if: github.ref == 'refs/heads/develop'
    environment: develop
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.SERVER_APP_PATH }}
            git fetch origin develop
            git reset --hard origin/develop
            docker compose build omninet-dev
            docker compose up -d --no-deps omninet-dev

  deploy-main:
    name: Deploy to Production (port 8001)
    runs-on: ubuntu-latest
    permissions: {}
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.SERVER_APP_PATH }}
            git fetch origin main
            git reset --hard origin/main
            docker compose build omninet-prd
            docker compose up -d --no-deps omninet-prd
