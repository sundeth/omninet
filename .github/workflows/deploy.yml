name: Build & Deploy to Unraid

on:
  push:
    branches:
      - develop
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Unraid
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env_name=production" >> $GITHUB_OUTPUT
            echo "compose_profile=production" >> $GITHUB_OUTPUT
            echo "service=omninet-prd" >> $GITHUB_OUTPUT
          else
            echo "env_name=staging" >> $GITHUB_OUTPUT
            echo "compose_profile=staging" >> $GITHUB_OUTPUT
            echo "service=omninet-dev" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.UNRAID_HOST }}
          username: ${{ secrets.UNRAID_USER }}
          key: ${{ secrets.UNRAID_SSH_KEY }}
          port: ${{ secrets.UNRAID_SSH_PORT || 22 }}
          script: |
            set -e

            DEPLOY_DIR="/mnt/user/appdata/omninet"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"

            # Ensure deploy directory exists
            mkdir -p "$DEPLOY_DIR"

            # Copy compose and env files if they don't exist
            # (first deploy — you'll need to manually place .env on the server)

            # Log in to GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker pull "$IMAGE"

            cd "$DEPLOY_DIR"

            # Ensure postgres is running (creates network + volume on first deploy)
            docker compose -f docker-compose.deploy.yml up -d postgres
            echo "Waiting for postgres to be healthy..."
            sleep 5

            # Run migrations
            echo "Running Alembic migrations for ${{ steps.env.outputs.env_name }}..."
            docker run --rm \
              --network omninet_omninet-network \
              --env-file "$DEPLOY_DIR/.env.${{ steps.env.outputs.env_name }}" \
              "$IMAGE" \
              python -m alembic upgrade head

            # Restart the service
            echo "Restarting ${{ steps.env.outputs.service }}..."
            docker compose -f docker-compose.deploy.yml \
              --profile ${{ steps.env.outputs.compose_profile }} \
              up -d --no-deps --force-recreate ${{ steps.env.outputs.service }}

            # Cleanup old images
            docker image prune -f

            echo "Deploy complete: ${{ steps.env.outputs.env_name }} (${{ github.sha }})"
