# =============================================================================
# Omninet - Unraid Deployment Compose
# =============================================================================
# Place this file at /mnt/user/appdata/omninet/docker-compose.deploy.yml
# along with .env.staging and .env.production
#
# Ports:
#   PostgreSQL : 5433 (separate from any existing postgres on 5432)
#   Staging    : 8000  (omnipet.app.br/dev via Cloudflare tunnel)
#   Production : 8001  (omnipet.app.br via Cloudflare tunnel)
#   SSH        : 22    (for GitHub Actions deploy)
#
# Usage:
#   Staging:    docker compose -f docker-compose.deploy.yml --profile staging up -d
#   Production: docker compose -f docker-compose.deploy.yml --profile production up -d
#   Both:       docker compose -f docker-compose.deploy.yml --profile staging --profile production up -d
# =============================================================================

services:
  # ---- PostgreSQL (dedicated to Omninet, port 5433) --------------------------
  postgres:
    image: postgres:15
    container_name: omninet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: omnipet_prd
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    networks:
      - omninet-network
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Staging (develop branch) → port 8000 ---------------------------------
  omninet-dev:
    image: ghcr.io/sundeth/omninet:develop
    container_name: omninet-server-dev
    restart: unless-stopped
    env_file: .env.staging
    environment:
      - ENVIRONMENT=dev
      - ROOT_PATH=/dev
    volumes:
      - ./dev:/app/storage
    networks:
      - omninet-network
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - staging

  # ---- Production (main branch) → port 8001 ---------------------------------
  omninet-prd:
    image: ghcr.io/sundeth/omninet:main
    container_name: omninet-server-prd
    restart: unless-stopped
    env_file: .env.production
    environment:
      - ENVIRONMENT=prd
    volumes:
      - ./prd:/app/storage
    networks:
      - omninet-network
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - production

networks:
  omninet-network:
    driver: bridge

volumes:
  postgres-data:
