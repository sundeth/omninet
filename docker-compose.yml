version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: omninet-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: omnipet_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - omninet-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Omninet Development Server
  omninet-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omninet-server-dev
    environment:
      - ENVIRONMENT=dev
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-root}@postgres:5432/omnipet_dev
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
    volumes:
      - ./storage:/app/storage
      - ./omninet:/app/omninet:ro  # Mount for live reload
    networks:
      - omninet-network
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "uvicorn", "omninet.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # Omninet Production Server (local testing only)
  omninet-prd:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omninet-server-prd
    environment:
      - ENVIRONMENT=prd
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD}@postgres:5432/omnipet_prd
      - SECRET_KEY=${SECRET_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    volumes:
      - ./storage:/app/storage
    networks:
      - omninet-network
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - production

networks:
  omninet-network:
    driver: bridge

volumes:
  postgres-data:
